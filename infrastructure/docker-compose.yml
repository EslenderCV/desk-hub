version: '3.8'

services:
  mosquitto:
    image: eclipse-mosquitto:latest
    container_name: desk-hub-mqtt
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log
    restart: unless-stopped

  dozzle:
    image: amir20/dozzle:latest
    container_name: desk-hub-logs
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "8888:8080"
    restart: unless-stopped

volumes:
  mosquitto_data:
  mosquitto_log: